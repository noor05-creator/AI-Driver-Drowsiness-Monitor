name: Commit Message Check

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit Message Check
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js